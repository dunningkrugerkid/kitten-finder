app = "kitten-finder"
primary_region = "yyz"

[build]

[env]
  PORT = "3000"
  HOST = "0.0.0.0"
  DB_PATH = "/data/kitten-finder.db"
  SCRAPE_INTERVAL_HOURS = "4"

[mounts]
  source = "kitten_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
